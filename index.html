<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>goose who loves flowers</title>
</head>
<body onclick="start()">
    <h1>goose who loves flowers</h1>
    <section>
        
        <div id="game">
            <div id="timer" class="score"></div>
            <div id="best" class="score"></div>
            <div id="message">Click anywhere to start and help the goose!</div>
            <div id="character"></div>
            <div id="block"></div>
        </div>
        <div id="end-page">
            <h2>U lost :(<br> The goose is sad cuz he destroyed a flower</h2>
            <label for="restart"></label>
            <button id="restart" onclick="setgame()">Restart game</button>
        </div>
    </section>
</body>
<script src="script.js"></script>
</html>
